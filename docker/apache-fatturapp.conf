<VirtualHost *:80>
    ServerAdmin webmaster@fatturapp.it
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Proteggi directory cron e setup da accesso web
    <DirectoryMatch "^/var/www/html/fatturazione/(cron|setup|migrations|dump|docker)">
        Require all denied
    </DirectoryMatch>

    # Log
    ErrorLog ${APACHE_LOG_DIR}/fatturapp-error.log
    CustomLog ${APACHE_LOG_DIR}/fatturapp-access.log combined

    # Nascondi versione server
    ServerTokens Prod
    ServerSignature Off
</VirtualHost>
